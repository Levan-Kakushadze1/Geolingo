{% extends 'base.html' %}
{% block content %}

<div class="text-center mt-4">
    <h2>👤 {{ current_user.username }}</h2>
    <p class="text-muted">{{ current_user.email }}</p>
</div>

<div class="row mt-4">
    <div class="col-md-4">
        <div class="card text-center p-4">
            <h1 class="text-success">{{ current_user.xp }}</h1>
            <p class="text-muted">Total XP 🏆</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center p-4">
            <h1 class="text-warning">{{ current_user.streak }}</h1>
            <p class="text-muted">Day Streak 🔥</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center p-4">
            <h1 class="text-primary">{{ total_lessons }}</h1>
            <p class="text-muted">Total Lessons 📚</p>
        </div>
    </div>
</div>

<div class="mt-4 text-center">
    <a href="/" class="btn btn-success">Continue Learning 🚀</a>
</div>

{% endblock %}
