{% extends 'base.html' %}
{% block content %}

<h2>{{ lesson.title }}</h2>
<p class="lead text-muted">{{ lesson.description }}</p>

<div class="card p-4 mt-4">
    <h4>📖 Lesson</h4>
    <div style="white-space: pre-line;">{{ lesson.content }}</div>
</div>

<div class="mt-4">
    <a href="/quiz/{{ lesson.id }}" class="btn btn-success btn-lg">Start Quiz 🚀</a>
    <a href="/" class="btn btn-secondary btn-lg ms-2">Back to Lessons</a>
</div>

{% endblock %}
